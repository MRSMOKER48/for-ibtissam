<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
overflow:hidden;
background:linear-gradient(135deg,#ffd6ec,#ffbddb,#ff9fcb);
height:100vh;
color:white;
position:relative;
}

/* pages */

.page{
display:none;
height:100vh;
width:100%;
position:absolute;
top:0;
left:0;
justify-content:center;
align-items:center;
flex-direction:column;
text-align:center;
padding:30px;
animation:fade 1s ease;
}

.page.active{
display:flex;
}

/* fade animation */

@keyframes fade{
from{
opacity:0;
transform:translateY(30px);
}
to{
opacity:1;
transform:translateY(0);
}
}

/* stars */

.star{
position:absolute;
width:2px;
height:2px;
background:white;
border-radius:50%;
opacity:0.8;
animation:twinkle 2s infinite alternate;
}

@keyframes twinkle{
from{
opacity:0.2;
}
to{
opacity:1;
}
}

/* hearts */

.heart{
position:absolute;
bottom:-20px;
font-size:20px;
animation:floatUp 6s linear infinite;
pointer-events:none;
}

@keyframes floatUp{
0%{
transform:translateY(0);
opacity:0;
}
20%{
opacity:1;
}
100%{
transform:translateY(-120vh);
opacity:0;
}
}

/* text */

.text{
font-size:2rem;
max-width:900px;
line-height:1.6;
min-height:140px;
text-shadow:0 0 10px rgba(255,255,255,0.5);
}

/* kitty */

.kitty{
font-size:4rem;
margin-bottom:20px;
animation:floatKitty 3s ease-in-out infinite;
}

@keyframes floatKitty{
0%{
transform:translateY(0);
}
50%{
transform:translateY(-10px);
}
100%{
transform:translateY(0);
}
}

/* switch */

.switch{
margin-top:40px;
width:90px;
height:45px;
background:white;
border-radius:50px;
position:relative;
cursor:pointer;
box-shadow:0 0 15px rgba(255,255,255,0.5);
}

.circle{
width:37px;
height:37px;
background:#ff69b4;
border-radius:50%;
position:absolute;
left:4px;
top:4px;
display:flex;
justify-content:center;
align-items:center;
font-size:18px;
transition:0.4s;
}

.switch:hover .circle{
left:48px;
}

/* ktbi hna password li 7da Qr */

input{
padding:15px;
border:none;
border-radius:30px;
outline:none;
width:250px;
text-align:center;
font-size:1rem;
margin-top:20px;
}

button{
padding:14px 28px;
border:none;
border-radius:30px;
margin-top:20px;
background:white;
color:#ff4fa0;
font-weight:bold;
cursor:pointer;
}

/* final button */

.download{
margin-top:40px;
padding:18px 35px;
background:white;
color:#ff4fa0;
border-radius:40px;
text-decoration:none;
font-size:1.2rem;
font-weight:bold;
box-shadow:0 0 20px rgba(255,255,255,0.5);
transition:0.3s;
}

.download:hover{
transform:scale(1.05);
}

.small{
margin-top:20px;
font-size:0.95rem;
opacity:0.8;
}

</style>

/* TYPE WRITER */

function typeWriter(element,text){

let interval = setInterval(()=>{

/* FLOATING HEARTS */
